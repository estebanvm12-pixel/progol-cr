function fmtDate(d) {

function pickFavoriteLabel(pick) {
  const h = pick.home, a = pick.away, fav = pick.favorite;
  if (fav === 'home') return h + ' gana';
  if (fav === 'away') return a + ' gana';
  if (fav === 'draw') return 'Empate';
  if (fav === 'home_draw') return h + ' no pierde';
  if (fav === 'away_draw') return a + ' no pierde';
  return fav || '—';

  try {
    const r = await fetch('/api/pick-del-dia');
    const d = await r.json();
    if (d.error || !d.pick) {
      renderError(d.error || 'No hay pick disponible para hoy.');
    } else {
      render(d.pick);
    }
  } catch(e) {
    renderError('Error al cargar el pick.');
  }
}

loadPick();
</script>
